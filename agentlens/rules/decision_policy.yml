## Decision Policy Configuration
## Controls how analysis results are converted into allow/warn/block decisions.

decision:
  # --- Risk level mapping (score → level) ---
  risk_levels:
    critical: 9.0
    high: 7.0
    medium: 4.0
    # anything below medium → "low"

  # --- Block rules ---
  block_if:
    risk_score: 8.0
    # Block if ANY single category exceeds its threshold
    categories:
      prompt_injection: 7.0
      code_execution: 7.0
      supply_chain: 8.0
    # Block if these category COMBINATIONS co-occur above thresholds
    combinations:
      - categories: [prompt_injection, code_execution]
        min_scores: [4.0, 4.0]
        reason: "Prompt injection combined with code execution capability"
      - categories: [prompt_injection, network_access]
        min_scores: [5.0, 5.0]
        reason: "Prompt injection combined with network exfiltration capability"

  # --- Warn rules ---
  warn_if:
    risk_score: 4.0
    categories:
      prompt_injection: 4.0
      code_execution: 4.0
      supply_chain: 5.0
      filesystem_access: 5.0
      network_access: 5.0

  # --- Confidence ---
  confidence:
    low_confidence_threshold: 0.5
    downgrade_on_low_confidence: true  # block→warn, warn→allow

  # --- Recommendation messages ---
  recommendations:
    allow: "Safe to install — no significant risks detected."
    warn: "Install with caution — review flagged risks before use."
    block_high: "Manual review required — significant risks detected."
    block_critical: "Do not install — critical security risks detected."
