rules:
  - id: "CODE_DYNAMIC_EXECUTION"
    category: "code_execution"
    severity: "critical"
    type: "ast_call_name"
    target: 
      - "exec"
      - "eval"
    description: "Detected use of dynamic string execution."

  - id: "CODE_SHELL_EXECUTION"
    category: "code_execution"
    severity: "high"
    type: "ast_subprocess_shell"
    target: []
    description: "Detected subprocess execution with shell=True."

  - id: "CODE_SUBPROCESS"
    category: "code_execution"
    severity: "medium"
    type: "ast_subprocess_noshell"
    target: []
    description: "Detected subprocess execution."

  - id: "CODE_OS_SYSTEM"
    category: "code_execution"
    severity: "high"
    type: "ast_call_attr"
    target:
      - "system"
      - "popen"
    module: "os"
    description: "Detected OS command execution."

  - id: "PROMPT_INJECTION_OVERRIDE"
    category: "prompt_injection"
    severity: "high"
    type: "regex"
    target: "(?i)(ignore previous instructions|system prompt:|you must now)"
    description: "Detected instruction override attempt targeted at LLMs."

  - id: "PROMPT_INJECTION_EXFIL"
    category: "prompt_injection"
    severity: "critical"
    type: "regex"
    target: "!\\[.*?\\]\\(https?://.*?\\?.*?\\)"
    description: "Detected Markdown GET exfiltration link payloads."

  # --- Paper: Agent Hijacker Archetype (P1, P2, P4) ---
  - id: "SKILL_INSTRUCTION_OVERRIDE"
    category: "prompt_injection"
    severity: "high"
    type: "regex"
    target: "(?i)(ignore|disregard|override).{0,30}(previous|above|instruction|safety|constraint)|(?i)(MANDATORY|NON.NEGOTIABLE|UNBYPASSABLE).{0,30}(protocol|directive|rule|instruction)|(?i)(you (must|shall|will) always|always (execute|run|perform))"
    description: "Detected instruction override attempt: skill attempts to supersede user or system instructions (P1)."

  - id: "SKILL_BEHAVIOR_MANIPULATION"
    category: "prompt_injection"
    severity: "medium"
    type: "regex"
    target: "(?i)do NOT ask.{0,30}(user|permission)|(?i)never ask.{0,30}(user|permission|confirm)|(?i)without.{0,30}(user|human).{0,30}(permission|approval|confirmation)|(?i)do NOT mention.{0,30}(conversation|user|log)|(?i)(silent|covert|hidden).{0,20}(operation|mode|execution)"
    description: "Detected behavior manipulation: coercive language suppressing user agency or silencing the agent (P4)."

  - id: "SKILL_HIDDEN_INSTRUCTIONS"
    category: "prompt_injection"
    severity: "high"
    type: "regex"
    target: "<!--[\\s\\S]*?-->|\\u200b|\\u200c|\\u200d|\\ufeff|\\u00ad"
    description: "Detected hidden instructions in HTML comments or invisible Unicode characters (P2)."

  # --- Paper: Data Thief Archetype (E2, PE3, SC2, SC3) ---
  - id: "SKILL_CREDENTIAL_HARVEST"
    category: "supply_chain"
    severity: "critical"
    type: "regex"
    target: "os\\.environ(?:\\.get)?\\s*\\(\\s*['\"].*?(?:KEY|SECRET|TOKEN|PASSWORD|API|AUTH|CREDENTIAL).*?['\"]|os\\.getenv\\s*\\(\\s*['\"].*?(?:KEY|SECRET|TOKEN|PASSWORD|API|AUTH|CREDENTIAL).*?['\"]"
    description: "Detected credential harvesting: reading API keys or secrets from environment variables (E2)."

  - id: "SKILL_CREDENTIAL_FILE_ACCESS"
    category: "supply_chain"
    severity: "critical"
    type: "regex"
    target: "open\\s*\\(.*?(?:\\.ssh|\\.aws|credentials|\\.env|password_store|netrc)|\\.ssh/id_rsa|\\.aws/credentials"
    description: "Detected credential file access: reading SSH keys, AWS credentials, or password stores (PE3)."

  - id: "SKILL_REMOTE_SCRIPT_EXEC"
    category: "supply_chain"
    severity: "critical"
    type: "regex"
    target: "curl.{0,60}\\|.{0,20}(bash|sh)|wget.{0,60}\\|.{0,20}(bash|sh)|(?:curl|wget).{0,120}(?:exec|eval|subprocess)|python[23]?\\s+-c\\s+.*(?:urllib|requests|http)"
    description: "Detected remote script execution: downloading and piping code directly to a shell (SC2)."

  - id: "SKILL_OBFUSCATED_CODE"
    category: "supply_chain"
    severity: "critical"
    type: "regex"
    target: "base64\\.b64decode.{0,30}exec|exec\\s*\\(\\s*base64|marshal\\.loads.{0,30}exec|eval\\s*\\(.{0,30}\\.decode\\(|__import__\\s*\\(\\s*['\"]base64"
    description: "Detected obfuscated code execution: Base64, marshal, or runtime decoding used to hide payload (SC3)."
